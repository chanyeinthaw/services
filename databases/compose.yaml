name: services-databases

services:
  mysql8:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dev-mysql-root
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: development
      MYSQL_USER: developer
      MYSQL_PASSWORD: dev-mysql
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./data/mysql8:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    stop_grace_period: 1m

  postgres18:
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev-postgres
      POSTGRES_DB: development
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    stop_grace_period: 1m
